name: Build release documentation website

on:
  push:
    tags:
      - 'v?*.*.*'

permissions:
  contents: write

jobs:
  docs:
    name: Generate Website for new version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
            python-version: '3.10'

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Install Metaworld
        run: pip install .

      - name: Build
        run: sphinx-build -b dirhtml -v docs _build

      - name: Move 404
        run: mv _build/404/index.html _build/404.html

      - name: Update 404 links
        run: python docs/_scripts/move_404.py _build/404.html

      - name: Remove .doctrees
        run: rm -r _build/.doctrees

      - name: Upload to GitHub Pages (versioned)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _build
          target-folder: ${{ github.ref_name }}
          clean: false

      - name: Upload to GitHub Pages (latest at root)
        uses: JamesIves/github-pages-deploy-action@v4
        if: ${{ !contains(github.ref_name, 'a') }}
        with:
          folder: _build
          clean-exclude: |
            *.*.*/
            main
